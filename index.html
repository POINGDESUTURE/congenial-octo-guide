<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM Médecine - Interface UNESS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>
    /* =========================================
       ECRAN D'ACCUEIL / NAVIGATION (inchangé)
       ========================================= */
    body { background-color: #f2f4f7; font-family: 'Roboto', sans-serif; font-size: 0.9375rem; color: #1d2125; padding-top: 20px; }
    .container { max-width: 1100px; }

    .btn-uness { background-color: #1177d1; color: white; border: none; padding: 12px 24px; border-radius: 4px; text-transform: uppercase; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.5px; }
    .btn-uness:hover { background-color: #0d5ea5; color: white; }

    .hidden { display: none; }
    .setup-card { background: white; border-radius: 8px; border: 1px solid #dee2e6; padding: 30px; }

    /* =========================================
       RENDU QUESTION / REPONSE - COPIE FIDELE UNESS
       (classes et valeurs reprises telles quelles du CSS
       et du HTML réel de la plateforme entrainement.uness.fr)
       ========================================= */
    #sessionScreen, #correctionScreen { background-color: #fff; padding: 30px; border-radius: 8px; border: 1px solid #dee2e6; }

    .que { clear: left; text-align: left; margin: 0 auto 1.8em auto; border-bottom: 2px solid #949494; padding-bottom: 1.5em; }
    .que::after { content: ""; display: table; clear: both; }
    .que:last-child { border-bottom: none; }

    .que .info { float: left; width: 7em; padding: .5em; margin-bottom: 1.8em; background-color: #f8f9fa; border: 1px solid #cad0d7; border-radius: 2px; }
    .que h3.no { margin: 0; font-size: .8em; line-height: 1; }
    .que span.qno { font-size: 1.5em; font-weight: 700; }
    .que .info > div { font-size: .8em; margin-top: .7em; }

    .que .content { margin: 0 0 0 8.5em; }
    .que .content::after { content: ""; display: table; clear: both; }

    .que .formulation { position: relative; padding: 0.5rem 0; margin-bottom: 1rem; color: #1d2125; background-color: #ffffff; }
    .que .formulation::after { content: ""; display: table; clear: both; }
	
	/* Masquage strict de "Texte de la question" */
    .accesshide { display: none !important; }

    .que .qtext { margin-bottom: 1.5em; }
    .que .qtext p:last-child { margin-bottom: 0; }
    .que .qtext img { max-width: 100%; border-radius: 4px; margin-top: .5em; }

    .que fieldset.ablock { border: 0; margin: 0; padding: 0; }
    .que legend.prompt { display: none; }

    .que .answer .r0, .que .answer .r1 { display: flex; margin: .25rem 0; align-items: flex-start; }
    .que .answer .r0 input[type="checkbox"], .que .answer .r1 input[type="checkbox"] { margin: .3rem .5rem; width: 14px; flex-shrink: 0; }
    .que .answernumber { min-width: 1.5em; font-weight: 700; }

    .que .answer [data-region="answer-label"] { display: flex; align-items: flex-start; flex: 1; cursor: pointer; }
    .que .answer [data-region="answer-label"] p { margin: 0; }
    .que .answer .flex-fill { flex: 1; }

    /* Correction : couleurs exactes du thème Moove/UNESS */
    .que .answer .correct { background-color: #b2edaf; padding-bottom: 5px; border-radius: 2px; padding-right: 5px; }
    .que .answer .correctnotchecked { background-color: #cde3cd; padding-bottom: 5px; border-radius: 2px; padding-right: 5px; }
    .que .answer .incorrect { background-color: #f4b9b8; padding-bottom: 5px; border-radius: 2px; padding-right: 5px; }
    .que .answer .incorrectnotchecked { background-color: #f4b9b8; padding-bottom: 5px; border-radius: 2px; padding-right: 5px; }
    .que .answer i.icon { font-size: 16px; margin-left: .4rem; }
    .que .answer i.icon.fa-check { color: #2f7a3d; }
    .que .answer i.icon.fa-times { color: #ca3120; }

    .que .outcome { position: relative; padding: .75rem 1.25rem; margin-top: 1rem; border-radius: .5rem; color: #8e662e; background-color: #fcefdc; border: 1px solid #fbe8cd; font-style: italic; font-size: .9em; }

    .que .correctness { display: inline-block; padding: .1em .7em; border-radius: 3px; font-size: .85em; font-weight: 700; }
    .que .correctness.correct { color: #fff; background-color: #64a44e; }
    .que .correctness.partiallycorrect { color: #1d2125; background-color: #f0ad4e; }
    .que .correctness.incorrect, .que .correctness.notanswered { color: #fff; background-color: #ca3120; }

    .que img { max-width: 100%; }

    /* Bouton de validation identique au bouton "Page suivante" de Moove (btn-primary) */
    #sessionScreen .btn-primary, #correctionScreen .btn-primary { background-color: #a463ad; border-color: #a463ad; }
    #sessionScreen .btn-primary:hover, #correctionScreen .btn-primary:hover { background-color: #905199; border-color: #894c91; }
</style>

</head>
<body>

<div class="container">
    <div id="homeScreen" class="setup-card shadow-sm">
        <h2 class="mb-4 text-center">🏥 QCM Médecine</h2>
        <div id="loadingScreen" class="text-center p-4">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Chargement...</p>
        </div>
        <div id="subjectsList" class="list-group list-group-flush"></div>
    </div>

    <div id="chapterScreen" class="hidden setup-card shadow-sm">
        <button class="btn btn-sm btn-outline-secondary mb-3" onclick="backToHome()">← Retour</button>
        <h3 id="currentSubjectTitle" class="mb-4"></h3>
        <div id="chaptersList" class="list-group list-group-flush"></div>
    </div>

    <div id="qcmScreen" class="hidden setup-card shadow-sm">
        <button class="btn btn-sm btn-outline-secondary mb-3" onclick="backToChapters()">← Retour</button>
        <h4 id="sessionChapterTitle" class="text-primary mb-4"></h4>
        <div class="mb-4" style="max-width: 300px;">
            <label class="form-label fw-bold">Nombre de questions :</label>
            <input type="number" id="sessionSize" class="form-control" value="10">
        </div>
        <button class="btn btn-uness w-100" onclick="startSession()">Démarrer la série</button>
    </div>

    <div id="sessionScreen" class="hidden">
        <div id="questionsContainer"></div>
        <div class="submitbtns text-center mt-4 mb-5">
            <button class="btn btn-primary px-4" onclick="validateFullSession()">Terminer le test…</button>
        </div>
    </div>

    <div id="correctionScreen" class="hidden">
        <div class="setup-card text-center mb-4">
            <h2 id="score" class="text-primary"></h2>
            <button class="btn btn-uness mt-3" onclick="backToQCMScreen()">Nouvelle session</button>
        </div>
        <div id="correctionDetails"></div>
    </div>
</div>

<script>
    let data = {};
    let currentSubject = '', currentChapter = '', currentSession = [], missedAnswers = [];

    async function loadAllQCM() {
        try {
            const configResponse = await fetch('QCM/config.json');
            const subjects = await configResponse.json();
            for (const subject in subjects) {
                data[subject] = {};
                for (const file of subjects[subject]) {
                    try {
                        const res = await fetch(`QCM/${subject}/${file}`);
                        const text = await res.text();
                        const parsed = parseQCMFile(text);
                        if (parsed.length > 0) {
                            data[subject][file.replace('.txt','').replace(/_/g,' ')] = parsed;
                        }
                    } catch (e) { console.error("Erreur fichier:", file); }
                }
            }
            document.getElementById('loadingScreen').classList.add('hidden');
            displaySubjects();
        } catch (e) { console.error(e); }
    }

    /* =========================================
       PARSER CORRIGÉ ET SÉCURISÉ
       ========================================= */
    function parseQCMFile(content) {
        const qcms = [];
        const blocks = content.replace(/\r/g, '').split(/\n\s*\n+/).filter(b => b.trim());
        
        blocks.forEach(block => {
            const lines = block.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if (lines.length < 6) return;

            let question = lines[0];
            
            if (question.includes('{') || question.includes(';') || question.includes('<')) return;

            let imagePath = null;
            let optionStartIndex = 1;

            if (lines[1] && lines[1].toUpperCase().startsWith('IMG:')) {
                imagePath = lines[1].substring(4).trim();
                optionStartIndex = 2;
            }

            const options = [];
            const optionRegex = /^(\$?)([A-E])[\.\)]\s+(.+)$/;

            for (let i = optionStartIndex; i < lines.length; i++) {
                const match = lines[i].match(optionRegex);
                if (match) {
                    options.push({ text: match[3], isCorrect: match[1] === '$' });
                }
            }

            if (options.length === 5) {
                qcms.push({ question, image: imagePath, options });
            }
        });
        return qcms;
    }

    function startSession() {
        const qcms = data[currentSubject][currentChapter];
        const size = Math.min(parseInt(document.getElementById('sessionSize').value), qcms.length);
        currentSession = [...qcms].sort(() => Math.random() - 0.5).slice(0, size);
        
        document.getElementById('qcmScreen').classList.add('hidden');
        document.getElementById('sessionScreen').classList.remove('hidden');
        
        const container = document.getElementById('questionsContainer');
        container.innerHTML = currentSession.map((q, qIdx) => `
            <div class="que sngmultichoice deferredfeedback notyetanswered" id="question-${qIdx}">
                <div class="info">
                    <h3 class="no">Question <span class="qno">${qIdx + 1}</span></h3>
                    <div class="state">Pas encore répondu</div>
                    <div class="grade">Noté sur 1,00</div>
                </div>
                <div class="content">
                    <div class="formulation clearfix">
                        <h4 class="accesshide">Texte de la question</h4>
                        <div class="qtext">
                            <p>${q.question}</p>
                            ${q.image ? `<img src="${q.image}">` : ''}
                        </div>
                        <fieldset class="ablock">
                            <legend class="prompt">Réponse</legend>
                            <div class="answer">
                                ${q.options.map((opt, oIdx) => `
                                    <div class="${oIdx % 2 === 0 ? 'r0' : 'r1'}">
                                        <input type="checkbox" id="q${qIdx}_o${oIdx}">
                                        <label for="q${qIdx}_o${oIdx}" data-region="answer-label">
                                            <span class="answernumber">${String.fromCharCode(97 + oIdx)}. </span>
                                            <div class="flex-fill ml-1"><p>${opt.text}</p></div>
                                        </label>
                                    </div>
                                `).join('')}
                            </div>
                        </fieldset>
                    </div>
                </div>
            </div>
        `).join('');
        window.scrollTo(0,0);
    }

    function validateFullSession() {
let score = 0;
const details = document.getElementById('correctionDetails');
details.innerHTML = '';
missedAnswers = [];

currentSession.forEach((q, qIdx) => {
    const userChoices = [];
    q.options.forEach((_, oIdx) => {
        if (document.getElementById(`q${qIdx}_o${oIdx}`).checked) userChoices.push(oIdx);
    });

    let errors = 0;
    q.options.forEach((opt, oIdx) => {
        const checked = userChoices.includes(oIdx);
        if (opt.isCorrect && !checked) errors++;
        if (!opt.isCorrect && checked) errors++;
    });

    let qScore = 0;
    if (errors === 0) qScore = 1.0;
    else if (errors === 1) qScore = 0.5;
    else if (errors === 2) qScore = 0.2;

    score += qScore;

    // Détermination de la classe de correction (comme sur la plateforme)
    let correctnessClass, correctnessLabel;
    if (errors === 0) { correctnessClass = 'correct'; correctnessLabel = 'Correct'; }
    else if (userChoices.length === 0) { correctnessClass = 'notanswered'; correctnessLabel = 'Pas de réponse'; }
    else if (qScore > 0) { correctnessClass = 'partiallycorrect'; correctnessLabel = 'Partiellement correct'; }
    else { correctnessClass = 'incorrect'; correctnessLabel = 'Incorrect'; }

    const optHtml = q.options.map((opt, oIdx) => {
        const checked = userChoices.includes(oIdx);
        let stateCls = '', icon = '';
        if (opt.isCorrect && checked) { stateCls = 'correct'; icon = '<i class="icon fa-solid fa-check"></i>'; }
        else if (opt.isCorrect && !checked) { stateCls = 'correctnotchecked'; icon = '<i class="icon fa-solid fa-check"></i>'; missedAnswers.push({q: q.question, a: opt.text}); }
        else if (!opt.isCorrect && checked) { stateCls = 'incorrect'; icon = '<i class="icon fa-solid fa-times"></i>'; }
        else { stateCls = 'incorrectnotchecked'; }
        return `
            <div class="${oIdx % 2 === 0 ? 'r0' : 'r1'}">
                <input type="checkbox" disabled ${checked ? 'checked' : ''}>
                <label data-region="answer-label" class="${stateCls}">
                    <span class="answernumber">${String.fromCharCode(97 + oIdx)}. </span>
                    <div class="flex-fill ml-1"><p>${opt.text}</p></div>
                    ${icon}
                </label>
            </div>`;
    }).join('');

    const noteStr = qScore.toFixed(2).replace('.', ',');

    details.innerHTML += `
        <div class="que sngmultichoice deferredfeedback ${correctnessClass}">
            <div class="info">
                <h3 class="no">Question <span class="qno">${qIdx + 1}</span></h3>
                <div class="state"><span class="correctness ${correctnessClass}">${correctnessLabel}</span></div>
                <div class="grade">Note : ${noteStr} sur 1,00</div>
            </div>
            <div class="content">
                <div class="formulation clearfix">
                    <div class="qtext">
                        <p>${q.question}</p>
                        ${q.image ? `<img src="${q.image}">` : ''}
                    </div>
                    <fieldset class="ablock">
                        <div class="answer">${optHtml}</div>
                    </fieldset>
                </div>
            </div>
        </div>`;
});

document.getElementById('sessionScreen').classList.add('hidden');
document.getElementById('correctionScreen').classList.remove('hidden');
const scoreSur20 = (score / currentSession.length * 20).toFixed(2).replace('.', ',');
document.getElementById('score').textContent = `Résultat : ${scoreSur20} / 20`;
window.scrollTo(0,0);

}

    function displaySubjects() {
        const list = document.getElementById('subjectsList');
        for (let s in data) {
            const item = document.createElement('button');
            item.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
            item.innerHTML = `${s} <span class="badge bg-primary rounded-pill">${Object.values(data[s]).reduce((a,b)=>a+b.length,0)}</span>`;
            item.onclick = () => openSubject(s);
            list.appendChild(item);
        }
    }
    function openSubject(s) {
        currentSubject = s;
        document.getElementById('homeScreen').classList.add('hidden');
        document.getElementById('chapterScreen').classList.remove('hidden');
        document.getElementById('currentSubjectTitle').textContent = s;
        const list = document.getElementById('chaptersList');
        list.innerHTML = '';
        for (let ch in data[s]) {
            const item = document.createElement('button');
            item.className = 'list-group-item list-group-item-action';
            item.textContent = ch;
            item.onclick = () => openChapter(ch);
            list.appendChild(item);
        }
    }
    function openChapter(ch) { currentChapter = ch; document.getElementById('chapterScreen').classList.add('hidden'); document.getElementById('qcmScreen').classList.remove('hidden'); document.getElementById('sessionChapterTitle').textContent = ch; }
    function backToHome() { document.getElementById('chapterScreen').classList.add('hidden'); document.getElementById('homeScreen').classList.remove('hidden'); }
    function backToChapters() { document.getElementById('qcmScreen').classList.add('hidden'); document.getElementById('chapterScreen').classList.remove('hidden'); }
    function backToQCMScreen() { document.getElementById('correctionScreen').classList.add('hidden'); document.getElementById('qcmScreen').classList.remove('hidden'); }
    
    loadAllQCM();
</script>

</body>
</html>
